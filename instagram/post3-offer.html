<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #FAFBFC;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(148,163,184,0.12) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
  .card {
    position: relative;
    width: 820px;
    border: 1px solid rgba(37,99,235,0.15);
    border-radius: 16px;
    background: #FFFFFF;
    padding: 60px;
    box-shadow: 0 4px 40px rgba(37,99,235,0.06), 0 0 1px rgba(37,99,235,0.15);
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #2563EB;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }
  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 44px;
    color: #0F172A;
    letter-spacing: -1px;
    margin-bottom: 28px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, #2563EB, rgba(37,99,235,0.1));
    margin-bottom: 32px;
  }
  .checklist {
    list-style: none;
    margin-bottom: 36px;
  }
  .checklist li {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    color: #475569;
    padding: 10px 0;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: rgba(37,99,235,0.08);
    border: 1px solid rgba(37,99,235,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check svg {
    width: 14px;
    height: 14px;
  }
  .pricing {
    border: 1px solid rgba(148,163,184,0.2);
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 32px;
    background: rgba(37,99,235,0.02);
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }
  .price-row + .price-row {
    border-top: 1px solid rgba(148,163,184,0.15);
    padding-top: 16px;
    margin-top: 8px;
  }
  .price-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #94A3B8;
  }
  .price-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #2563EB;
  }
  .price-value.zero {
    font-size: 28px;
    color: #10B981;
  }
  .footer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #94A3B8;
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="card">
    <div class="tag">Now Open</div>
    <div class="title">Founding Partner Program</div>
    <div class="divider"></div>
    <ul class="checklist">
      <li>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        Full technical SEO audit
      </li>
      <li>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        Google Business Profile optimization
      </li>
      <li>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        5-8 treatment landing pages
      </li>
      <li>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        8 SEO blog posts
      </li>
      <li>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        50+ directory citations
      </li>
      <li>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        90-day performance report
      </li>
    </ul>
    <div class="pricing">
      <div class="price-row">
        <span class="price-label">Scope value</span>
        <span class="price-value">$6,000+</span>
      </div>
      <div class="price-row">
        <span class="price-label">Your investment</span>
        <span class="price-value zero">$0</span>
      </div>
    </div>
    <div class="footer">2 spots available. Apply via link in bio.</div>
  </div>
</body>
</html>
